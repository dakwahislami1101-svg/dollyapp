name: Build Android APK & AAB Bundle

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App via Capacitor
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build the web application (React + Vite)
      - name: Build Web App
        run: npm run build

      # Step 5: Set up Java Development Kit (JDK) 17
      # Modern Android Gradle Plugin requires JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # Step 6: Initialize Capacitor Android if not already committed
      # This ensures if the 'android' folder isn't in your repository, it gets added on the fly.
      - name: Add Android Platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder is missing. Generating with Capacitor..."
            npx cap add android
          else
            echo "Android platform already loaded."
          fi

      # Step 7: Sync web assets and plugins to android native folder
      - name: Capacitor Sync
        run: npx cap sync android

      # Step 8: Grant execution permissions for Gradle wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew

      # Step 9: Generate Release Keystore Signature Key dynamically
      - name: Generate Release Keystore
        run: |
          keytool -genkeypair -v \
            -keystore dolly.keystore \
            -alias "${{ secrets.KEYSTORE_ALIAS || 'dolly-key' }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'dolly123' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'dolly123' }}" \
            -dname "CN=Dolly Dating App, OU=Mobile, O=Dolly, L=Jakarta, C=ID"

      # Step 10: Build Android Release APK and AAB Bundle
      - name: Build Android Release Binaries
        run: |
          cd android
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # Step 11: Sign Android Artifacts (APK with apksigner, AAB with jarsigner)
      - name: Sign Android Binaries
        env:
          KEY_PASS: "${{ secrets.KEYSTORE_PASSWORD || 'dolly123' }}"
          KEY_ALIAS: "${{ secrets.KEYSTORE_ALIAS || 'dolly-key' }}"
        run: |
          mkdir -p build-artifacts
          
          # Locating the compiled release APK
          APK_RAW=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "Found compiled raw APK at: $APK_RAW"
          
          # Locating apksigner dynamically in Android build-tools
          APKSIGNER_BIN=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          echo "Using apksigner at: $APKSIGNER_BIN"
          
          if [ -n "$APK_RAW" ]; then
            $APKSIGNER_BIN sign \
              --ks dolly.keystore \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEY_PASS" \
              --key-pass "pass:$KEY_PASS" \
              --out build-artifacts/dolly-release-signed.apk \
              "$APK_RAW"
            echo "Successfully signed APK!"
          else
            echo "::error::Release APK not found to sign!"
            exit 1
          fi
          
          # Locating the compiled release AAB (Android App Bundle)
          AAB_RAW=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          echo "Found compiled raw AAB at: $AAB_RAW"
          
          if [ -n "$AAB_RAW" ]; then
            # Copy to sign
            cp "$AAB_RAW" build-artifacts/dolly-release-signed.aab
            
            # AAB must be signed with jarsigner (apksigner does not support .aab bundle formats)
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore dolly.keystore \
              -storepass "$KEY_PASS" \
              -keypass "$KEY_PASS" \
              build-artifacts/dolly-release-signed.aab \
              "$KEY_ALIAS"
            echo "Successfully signed AAB Bundle!"
          else
            echo "::warning::Release AAB not found to sign!"
          fi

      # Step 12: Upload Signed APK
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Dolly-Signed-Release-APK
          path: build-artifacts/dolly-release-signed.apk
          retention-days: 14

      # Step 13: Upload Signed AAB
      - name: Upload Signed AAB Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Dolly-Signed-Release-AAB
          path: build-artifacts/dolly-release-signed.aab
          retention-days: 14

      # Step 14: Upload Keystore Safe Backup File
      # This allows the user to download the generated keystore for future updates!
      - name: Upload Keystore Key Backup
        uses: actions/upload-artifact@v4
        with:
          name: Dolly-Keystore-Backup
          path: dolly.keystore
          retention-days: 14
